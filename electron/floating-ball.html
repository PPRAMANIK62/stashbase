<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline';">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    button {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.92);
      color: white;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.28);
      cursor: grab;
      display: grid;
      place-items: center;
      padding: 0;
    }

    button:active {
      cursor: grabbing;
    }

    svg {
      width: 24px;
      height: 24px;
      pointer-events: none;
    }

    /* While recording, the ball turns into a red stop button. */
    button.is-recording {
      background: rgba(220, 38, 38, 0.95);
      border-color: rgba(220, 38, 38, 0.6);
      box-shadow: 0 12px 30px rgba(220, 38, 38, 0.35);
    }

    .icon-stop { display: none; }
    button.is-recording .icon-camera { display: none; }
    button.is-recording .icon-stop { display: block; }
  </style>
</head>
<body>
  <button id="capture" type="button" title="Record a window">
    <svg class="icon-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="6" width="14" height="12" rx="2"></rect>
      <path d="M16 10l5-3v10l-5-3z"></path>
    </svg>
    <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
      <rect x="7" y="7" width="10" height="10" rx="2"></rect>
    </svg>
  </button>
  <script>
    const button = document.getElementById('capture');
    let drag = null;
    let moved = false;
    let recording = false;

    window.electron.onRecordingState((isRecording) => {
      recording = isRecording;
      button.classList.toggle('is-recording', isRecording);
      button.title = isRecording ? 'Stop recording' : 'Record a window';
    });

    button.addEventListener('pointerdown', async (event) => {
      const bounds = await window.electron.getFloatingBounds();
      if (!bounds) return;
      moved = false;
      drag = {
        startX: event.screenX,
        startY: event.screenY,
        winX: bounds.x,
        winY: bounds.y,
      };
      button.setPointerCapture(event.pointerId);
    });

    button.addEventListener('pointermove', (event) => {
      if (!drag) return;
      const dx = event.screenX - drag.startX;
      const dy = event.screenY - drag.startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      if (!moved) return;
      window.electron.setFloatingPosition({
        x: drag.winX + dx,
        y: drag.winY + dy,
      });
    });

    button.addEventListener('pointerup', () => {
      if (!drag) return;
      drag = null;
      if (moved) return;
      // A plain click stops the active recording, or starts a new window
      // recording when idle (opens the window picker).
      if (recording) window.electron.stopRecording();
      else window.electron.startWindowRecording();
    });

    button.addEventListener('pointercancel', () => {
      drag = null;
    });
  </script>
</body>
</html>
