<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
</head>
<!--
  Hidden recorder renderer. MediaRecorder is a DOM API the main process
  can't run, so screen recording lives here. Two source-selection paths:
    - macOS 15+ : startCapture() → getDisplayMedia() raises the system
      picker (lists fullscreen apps). Main triggers it with an injected
      user gesture (executeJavaScript(..., true)).
    - older     : start(sourceId) → getUserMedia(chromeMediaSource:desktop)
      for a window chosen in our own picker.
  Off-screen (show:false) + backgroundThrottling:false so timers keep
  firing while hidden. Failures are reported, never swallowed.
-->
<body>
  <script>
    let recorder = null;
    let chunks = [];
    let stream = null;

    function errMsg(e) {
      return e && typeof e.message === 'string' ? e.message : String(e);
    }

    function pickMime() {
      const candidates = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
      for (const c of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
      }
      return '';
    }

    function stopTracks() {
      if (stream) {
        for (const t of stream.getTracks()) t.stop();
        stream = null;
      }
    }

    // Wire up MediaRecorder once a stream exists (either path).
    function beginRecorder() {
      // The OS screen-recording indicator's "Stop" ends the track; treat
      // that as a stop so we still save what was captured.
      const [track] = stream.getVideoTracks();
      if (track) track.addEventListener('ended', () => stop());

      // Hand main what we know about the capture target (whole screen vs a
      // window, and the pixel size) so it can label the floating indicator
      // with which display is being recorded. Best-effort; absent fields
      // just yield a generic indicator.
      try {
        const s = track && track.getSettings ? track.getSettings() : {};
        window.electron.recorderMeta({
          displaySurface: s.displaySurface || '',
          width: s.width || 0,
          height: s.height || 0,
        });
      } catch (_) { /* metadata is optional */ }

      const mime = pickMime();
      try {
        // High bitrate on purpose: OCR needs crisp text, and at 2fps
        // sampling we dedup near-identical frames anyway, so motion size
        // isn't a concern. The clip is transient (OCR'd then discarded /
        // posted to the 512 MB recording route), so we favour legibility.
        const opts = { videoBitsPerSecond: 16_000_000 };
        if (mime) opts.mimeType = mime;
        recorder = new MediaRecorder(stream, opts);
      } catch (err) {
        stopTracks();
        window.electron.recorderError(errMsg(err));
        return;
      }
      recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = onStop;
      recorder.onerror = (e) => {
        stopTracks();
        recorder = null;
        window.electron.recorderError(errMsg((e && e.error) || e));
      };
      recorder.start();
    }

    // Older-macOS path: a specific window/screen id chosen in our picker.
    async function start(sourceId) {
      chunks = [];
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: sourceId,
              // Without an explicit cap, desktop capture downscales to a
              // low default (~720/1080p) → blurry text → bad OCR. Set the
              // cap well above any display's native pixel size so we
              // capture at full resolution (it's a ceiling, not a floor).
              maxWidth: 7680,
              maxHeight: 4320,
              maxFrameRate: 30,
            },
          },
        });
      } catch (err) {
        window.electron.recorderError(errMsg(err));
        return;
      }
      beginRecorder();
    }

    // macOS 15+ path: the system picker chooses the source.
    async function startCapture() {
      chunks = [];
      try {
        stream = await navigator.mediaDevices.getDisplayMedia({
          // Ask for native resolution so text stays sharp for OCR.
          video: { width: { ideal: 7680 }, height: { ideal: 4320 }, frameRate: { ideal: 30 } },
          audio: false,
        });
      } catch (err) {
        // User dismissed the system picker → quiet cancel, not an error.
        if (err && (err.name === 'NotAllowedError' || err.name === 'AbortError')) {
          window.electron.recorderCanceled();
        } else {
          window.electron.recorderError(errMsg(err));
        }
        return;
      }
      window.electron.recorderStarted();
      beginRecorder();
    }

    function stop() {
      if (recorder && recorder.state !== 'inactive') {
        recorder.stop(); // fires onstop, where we package the blob
      } else {
        stopTracks();
      }
    }

    function onStop() {
      const type = (recorder && recorder.mimeType) || 'video/webm';
      const blob = new Blob(chunks, { type });
      chunks = [];
      recorder = null;
      stopTracks();
      const reader = new FileReader();
      reader.onload = () => {
        window.electron.recorderResult({ dataUrl: reader.result, mime: 'video/webm' });
      };
      reader.onerror = () => window.electron.recorderError('Failed to read recording.');
      reader.readAsDataURL(blob);
    }

    // macOS 15+ path entry (main calls this via executeJavaScript + gesture).
    window.startCapture = startCapture;
    // Older-macOS path entry.
    window.electron.onRecorderStart((sourceId) => { void start(sourceId); });
    window.electron.onRecorderStop(() => { stop(); });
  </script>
</body>
</html>
